[project]
name = "mldsa"
version = "0.1.0"
description = "A pure-Python implementation of ML-DSA-44 verification"
readme = "README.md"
authors = [{name = "Filippo Valsorda"}]
requires-python = ">=3.8"
dependencies = [
    "typing_extensions>=4.0; python_version < '3.11'",
]
license = "CC0-1.0 OR 0BSD"

[build-system]
requires = ["uv_build>=0.9.21,<0.10.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "ruff>=0.15.5",
    "ty>=0.0.21",
]

[tool.ruff]
line-length = 105

[tool.ruff.lint]
ignore = ["E741"]
